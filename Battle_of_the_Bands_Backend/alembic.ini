[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank here — env.py builds it from
# the same DATABASE_URL env var (and the same sqlite fallback path) that
# app/database.py uses, so migrations always target the same DB the app does.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
